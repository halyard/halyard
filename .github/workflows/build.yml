---
name: Build
'on':
  pull_request:
  push:
    branches:
    - main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Run base CI
      uses: akerl/.github/actions/base-ruby@main
    - name: Post to hook-exporter
      uses: akerl/.github/actions/hook-exporter@main
      with:
        token: ${{ secrets.EXPORTER_TOKEN }}
        status: ${{ job.status }}
